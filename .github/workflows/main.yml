name: Run Python Scripts

on:
  # Keep cron if you still want backup scheduling
  schedule:
    - cron: '30 3 * * *'

  # Required for n8n / manual trigger
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests gspread google-auth

      # Optional but useful for debugging
      - name: Debug start
        run: echo "Starting scripts..."

      - name: Run scripts
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: |
          python Meta_Creatives_Script.py
          python Meta_Spends_Script.py

      # Optional debug end
      - name: Debug end
        run: echo "Scripts completed"
